<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Loop Live • Pro v2.0</title>
    <meta content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" name="viewport" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dplayer@latest/dist/DPlayer.min.css" />
    <style>
        :root {
            --primary: #a020f0;
            --secondary: #00ff88;
            --bg-dark: #0c0b0f;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(170, 0, 255, 0.3);
            --header-h: 70px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Readex Pro', sans-serif; 
            background: var(--bg-dark); 
            color: #fff; 
            overflow-x: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(138, 43, 226, 0.12) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(213, 0, 249, 0.1) 0%, transparent 40%);
        }

        /* App Header */
        .app-header { 
            height: var(--header-h); 
            background: rgba(18, 18, 22, 0.85); 
            backdrop-filter: blur(15px); 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 20px; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        .logo h1 { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #fff, #d9b3ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo span { color: var(--primary); font-size: 0.7rem; margin-right: 5px; }
        .menu-btn { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; cursor: pointer; color: #fff; background: var(--glass); border-radius: 12px; }

        /* Sidenav System */
        .sidenav-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 2999;
            visibility: hidden; opacity: 0; transition: 0.3s;
        }
        .sidenav { 
            height: 100%; width: 280px; position: fixed; z-index: 3000; top: 0; right: -280px; 
            background: #111014; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: -10px 0 30px rgba(0,0,0,0.5); padding: 25px;
        }
        .sidenav.active { right: 0; }
        .sidenav-overlay.active { visibility: visible; opacity: 1; }

        .sidenav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .sidenav-header h2 { font-size: 1.2rem; border-right: 3px solid var(--primary); padding-right: 10px; }
        .close-nav { font-size: 1.8rem; cursor: pointer; color: #666; }

        .nav-items { display: flex; flex-direction: column; gap: 15px; }
        .nav-link { 
            padding: 16px 20px; border-radius: 15px; background: var(--glass); 
            color: #ccc; text-decoration: none; display: flex; align-items: center; 
            gap: 15px; transition: 0.3s; font-weight: 500;
        }
        .nav-link:hover { background: rgba(160, 32, 240, 0.2); color: #fff; transform: translateX(-5px); }
        .nav-link i { font-size: 1.2rem; color: var(--primary); }

        /* Main Content */
        .main-container { padding: 20px 15px; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .banner { width: 100%; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .card { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 20px; padding: 15px 5px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); background: rgba(160, 32, 240, 0.1); }
        .card img { width: 40px; margin-bottom: 10px; }
        .card h4 { font-size: 0.8rem; font-weight: 600; margin-bottom: 5px; }
        .card .badge { font-size: 0.6rem; color: var(--secondary); background: rgba(0, 255, 136, 0.1); padding: 2px 8px; border-radius: 10px; }

        /* Fullscreen Player Container */
        #playerView { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 2000; display: none; flex-direction: column; 
        }
        .p-header { height: 60px; display: flex; align-items: center; padding: 0 15px; background: #111; border-bottom: 1px solid #222; }
        .back-btn { background: none; border: none; color: #fff; font-family: inherit; font-size: 1rem; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        
        #dplayer { width: 100%; height: 35vh; flex-shrink: 0; }
        
        .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-dark); }
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: var(--glass); padding: 12px; border-radius: 15px; max-width: 85%; align-self: flex-start; }
        .msg.me { align-self: flex-end; background: rgba(160, 32, 240, 0.15); border: 1px solid var(--border); }
        .msg .u { font-size: 0.7rem; font-weight: 700; color: var(--primary); margin-bottom: 4px; display: block; }
        
        .chat-input { padding: 15px; display: flex; gap: 10px; background: #121216; }
        .chat-input input { flex: 1; padding: 12px 18px; border-radius: 25px; background: #000; border: 1px solid #333; color: #fff; outline: none; }
        .chat-input button { width: 45px; height: 45px; border-radius: 50%; background: var(--primary); border: none; color: #fff; cursor: pointer; }

        /* Overlay for autoplay */
        #start-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .play-ring { width: 70px; height: 70px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; box-shadow: 0 0 20px var(--primary); margin-bottom: 10px; }

        /* Admin Modal */
        .modal { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 4000; padding: 20px;
        }
        .modal-body { background: #1a1a1e; border: 1px solid var(--primary); border-radius: 25px; width: 100%; max-width: 400px; padding: 30px; }
        .modal-body h3 { text-align: center; margin-bottom: 25px; }
        
        .admin-stat { background: rgba(0,255,136,0.05); color: var(--secondary); padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 20px; font-weight: 700; border: 1px dashed var(--secondary); }
        .admin-stat i { animation: pulse 1.5s infinite; margin-left: 10px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .inp-group { width: 100%; margin-bottom: 15px; }
        .inp-group input { width: 100%; padding: 14px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; outline: none; font-family: inherit; }
        .admin-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-save { background: var(--primary); color: #fff; margin-bottom: 10px; }
        .btn-close { background: #222; color: #888; }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="logo"><h1>LOOP<span>LIVE</span></h1></div>
        <div class="menu-btn" onclick="toggleNav(true)"><i class="fas fa-bars-staggered"></i></div>
    </header>

    <div class="sidenav-overlay" id="overlay" onclick="toggleNav(false)"></div>
    <div class="sidenav" id="nav">
        <div class="sidenav-header">
            <h2>القائمة المباشرة</h2>
            <div class="close-nav" onclick="toggleNav(false)">&times;</div>
        </div>
        <div class="nav-items">
            <a href="https://t.me/Loop_live" class="nav-link" target="_blank">
                <i class="fab fa-telegram-plane"></i> قناة التلجرام
            </a>
            <div class="nav-link" style="cursor: pointer;" onclick="openAdmin()">
                <i class="fas fa-user-gear"></i> لوحة التحكم
            </div>
        </div>
    </div>

    <main class="main-container">
        <img src="https://i.ibb.co/9HSYp7Ps/IMG-536.png" class="banner" alt="Banner">
        <div class="grid" id="grid">
            </div>
    </main>

    <div id="playerView">
        <div class="p-header">
            <button class="back-btn" onclick="location.reload()">
                <i class="fas fa-arrow-right"></i> الرجوع للقائمة
            </button>
        </div>
        <div id="dplayer"></div>
        <div class="chat-area">
            <div id="chatBox"></div>
            <div class="chat-input">
                <input type="text" id="chatMsg" placeholder="تفاعل مع البث..." autocomplete="off">
                <button onclick="doSend()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
        <div id="start-overlay" onclick="startStream()">
            <div class="play-ring"><i class="fas fa-play"></i></div>
            <p>انقر للتشغيل والمشاركة</p>
        </div>
    </div>

    <div class="modal" id="adminModal">
        <div class="modal-body">
            <h3 id="modalTitle">دخول المسؤول</h3>
            
            <div id="loginStep">
                <div class="inp-group">
                    <input type="password" id="adminPass" placeholder="كلمة السر">
                </div>
                <button class="admin-btn btn-save" onclick="checkAuth()">دخول</button>
                <button class="admin-btn btn-close" onclick="closeAdmin()">إغلاق</button>
            </div>

            <div id="adminStep" style="display:none;">
                <div class="admin-stat">
                    <i class="fas fa-circle"></i> المتصلين الآن: <span id="onlineCount">0</span>
                </div>
                <div class="inp-group"><input type="text" id="l1" placeholder="رابط beIN 1"></div>
                <div class="inp-group"><input type="text" id="l2" placeholder="رابط beIN 2"></div>
                <div class="inp-group"><input type="text" id="l3" placeholder="رابط beIN 3"></div>
                <button class="admin-btn btn-save" onclick="doSave()">حفظ الروابط</button>
                <button class="admin-btn btn-close" onclick="closeAdmin()">إغلاق</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/dplayer@latest/dist/DPlayer.min.js"></script>

    <script>
        const SB_URL = 'https://wfxpyrcxmjdyeiakocsw.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmeHB5cmN4bWpkeWVpYWtvY3N3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MDg2MjEsImV4cCI6MjA4NzI4NDYyMX0.RYAeFZA_TJL929FlYhBYCFY2zj4EA8P87yhNX5klwxw';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let dataLinks = { bein1: '', bein2: '', bein3: '' };
        let dp = null;
        let hub = null;
        const myNick = 'عضو_' + Math.floor(Math.random()*9999);

        // --- Core Functions ---
        async function loadApp() {
            // Load Links
            const { data } = await _supabase.from('settings').select('value').eq('key', 'stream_links').single();
            if(data) dataLinks = data.value;
            drawChannels();

            // Realtime Hub (Presence + Chat)
            hub = _supabase.channel('global', { config: { presence: { key: 'u' }, broadcast: { self: true } } });
            
            hub.on('presence', { event: 'sync' }, () => {
                const count = Object.keys(hub.presenceState()).length;
                document.getElementById('onlineCount').innerText = count;
            })
            .on('broadcast', { event: 'chat' }, (res) => {
                pushMsg(res.payload.u, res.payload.t);
            })
            .subscribe(async (status) => {
                if(status === 'SUBSCRIBED') await hub.track({ active: true });
            });
        }

        function drawChannels() {
            const container = document.getElementById('grid');
            const items = [{id:'bein1', n:'beIN 1'}, {id:'bein2', n:'beIN 2'}, {id:'bein3', n:'beIN 3'}];
            container.innerHTML = items.map(i => `
                <div class="card" onclick="launchStream('${i.id}')">
                    <img src="https://i.ibb.co/P4043GB/bein-512.png">
                    <h4>${i.n}</h4>
                    <span class="badge">LIVE</span>
                </div>
            `).join('');
        }

        // --- Navigation Control ---
        function toggleNav(show) {
            document.getElementById('nav').classList.toggle('active', show);
            document.getElementById('overlay').classList.toggle('active', show);
        }

        // --- Player & Chat ---
        window.launchStream = function(id) {
            const url = dataLinks[id];
            if(!url) return alert('البث متوقف حالياً');
            document.getElementById('playerView').style.display = 'flex';
            dp = new DPlayer({
                container: document.getElementById('dplayer'),
                live: true,
                video: { url: url, type: 'customHls', customType: {
                    customHls: (v) => { const hls = new Hls(); hls.loadSource(v.src); hls.attachMedia(v); }
                }}
            });
        }

        window.startStream = function() {
            document.getElementById('start-overlay').style.display = 'none';
            if(dp) { dp.video.muted = false; dp.play(); }
        }

        window.doSend = function() {
            const inp = document.getElementById('chatMsg');
            if(!inp.value.trim()) return;
            hub.send({ type: 'broadcast', event: 'chat', payload: { u: myNick, t: inp.value } });
            inp.value = '';
        }

        function pushMsg(u, t) {
            const box = document.getElementById('chatBox');
            const div = document.createElement('div');
            const isMe = u === myNick;
            div.className = `msg ${isMe ? 'me' : ''}`;
            div.innerHTML = `<span class="u">${isMe ? 'أنت' : u}</span><div class="t">${t}</div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        // --- Admin Control ---
        window.openAdmin = () => {
            toggleNav(false);
            document.getElementById('adminModal').style.display = 'flex';
        }

        window.closeAdmin = () => {
            document.getElementById('adminModal').style.display = 'none';
        }

        window.checkAuth = function() {
            if(document.getElementById('adminPass').value === 'ali2008#$1') {
                document.getElementById('loginStep').style.display = 'none';
                document.getElementById('adminStep').style.display = 'block';
                document.getElementById('modalTitle').innerText = 'لوحة التحكم - مباشر';
                document.getElementById('l1').value = dataLinks.bein1;
                document.getElementById('l2').value = dataLinks.bein2;
                document.getElementById('l3').value = dataLinks.bein3;
            } else { alert('كلمة السر غير صحيحة'); }
        }

        window.doSave = async function() {
            const updated = {
                bein1: document.getElementById('l1').value,
                bein2: document.getElementById('l2').value,
                bein3: document.getElementById('l3').value
            };
            const { error } = await _supabase.from('settings').upsert({ key: 'stream_links', value: updated });
            if(!error) { alert('تم تحديث الروابط بنجاح'); location.reload(); }
        }

        // --- Enter key support ---
        document.getElementById('chatMsg').onkeydown = (e) => { if(e.key === 'Enter') doSend(); };

        // Start App
        loadApp();
    </script>
</body>
</html>
